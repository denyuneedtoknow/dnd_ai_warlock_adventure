<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Грати — Діоніс</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Layout ────────────────────────────────────────────────────── */

    .play-page {
      max-width: 840px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .play-header {
      text-align: center;
    }

    .play-header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--gold-light);
      margin: 0 0 0.3rem;
      letter-spacing: 0.04em;
    }

    .play-header .subtitle {
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      color: var(--text-muted);
      margin: 0;
      font-style: italic;
    }

    /* ── Context bar ───────────────────────────────────────────────── */

    .ctx-bar {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.45rem 0.9rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      font-family: 'Crimson Text', serif;
      font-size: 0.88rem;
      color: var(--text-muted);
      min-height: 32px;
    }

    .ctx-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .ctx-bar.ok   .ctx-dot { background: var(--green-l); }
    .ctx-bar.err  .ctx-dot { background: var(--crimson-l); }
    .ctx-bar.ok   { color: var(--text); }

    /* ── Chat messages ─────────────────────────────────────────────── */

    .chat-messages {
      min-height: 420px;
      max-height: 58vh;
      overflow-y: auto;
      padding: 1.25rem;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      scroll-behavior: smooth;
    }

    /* ── Individual messages ───────────────────────────────────────── */

    .msg {
      display: flex;
      gap: 0.65rem;
      animation: msg-fade 0.18s ease-out both;
    }

    @keyframes msg-fade {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: none; }
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
      margin-top: 3px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    /* DM message */
    .msg.dm {
      align-self: flex-start;
      max-width: 88%;
    }

    .msg.dm .msg-avatar {
      border-color: var(--border-gold);
      background: #1e1826;
    }

    .msg.dm .msg-bubble {
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      color: var(--text);
    }

    /* Player message */
    .msg.player {
      align-self: flex-end;
      flex-direction: row-reverse;
      max-width: 80%;
    }

    .msg.player .msg-bubble {
      background: var(--bg-hover);
      border: 1px solid var(--border);
      color: var(--text-bright);
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .msg-bubble {
      padding: 0.65rem 0.95rem;
      border-radius: 8px;
      font-family: 'Crimson Text', serif;
      font-size: 1.06rem;
      line-height: 1.68;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Thinking indicator ────────────────────────────────────────── */

    .thinking-wrap {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 0.65rem 0.95rem;
      background: var(--bg-card);
      border: 1px solid var(--border-gold);
      border-radius: 8px;
      width: fit-content;
    }

    .thinking-wrap span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: think-dot 1.3s ease-in-out infinite;
    }

    .thinking-wrap span:nth-child(2) { animation-delay: 0.22s; }
    .thinking-wrap span:nth-child(3) { animation-delay: 0.44s; }

    @keyframes think-dot {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40%            { opacity: 1;   transform: scale(1.25); }
    }

    /* ── Save-to-journal button ────────────────────────────────────── */

    .save-btn {
      align-self: flex-start;
      padding: 0.28rem 0.75rem;
      background: transparent;
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .save-btn:hover {
      background: rgba(201, 146, 42, 0.13);
      color: var(--gold-light);
    }

    /* ── Input area ────────────────────────────────────────────────── */

    .chat-input-area {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      padding: 0.85rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: 1px solid var(--border-gold);
      border-radius: 0 0 8px 8px;
    }

    #chat-input {
      width: 100%;
      min-height: 70px;
      max-height: 180px;
      resize: vertical;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-bright);
      font-family: 'Crimson Text', serif;
      font-size: 1.05rem;
      line-height: 1.55;
      padding: 0.55rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    #chat-input:focus        { border-color: var(--border-gold); }
    #chat-input::placeholder { color: var(--text-muted); font-style: italic; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .input-hint {
      font-family: 'Crimson Text', serif;
      font-size: 0.83rem;
      color: var(--text-muted);
      font-style: italic;
      flex: 1;
    }

    #send-btn {
      padding: 0.5rem 1.4rem;
      background: linear-gradient(180deg, var(--gold-light), var(--gold));
      border: none;
      border-radius: 6px;
      color: #0d0b0e;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      white-space: nowrap;
    }

    #send-btn:hover:not(:disabled)  { opacity: 0.88; }
    #send-btn:active:not(:disabled) { transform: scale(0.97); }
    #send-btn:disabled              { opacity: 0.4; cursor: not-allowed; }

    /* ── Responsive ────────────────────────────────────────────────── */

    @media (max-width: 640px) {
      .play-page    { padding: 1rem 0.75rem 2rem; }
      .chat-messages { max-height: 52vh; }
      .msg.dm, .msg.player { max-width: 96%; }
    }
  </style>
</head>
<body>
  <nav id="nav"></nav>

  <main class="play-page">
    <header class="play-header">
      <h1>⚔ Грати</h1>
      <p class="subtitle">Сесія з Майстром Підземель · Forgotten Realms · D&D 5e</p>
    </header>

    <!-- Context status bar -->
    <div class="ctx-bar" id="ctx-bar">
      <div class="ctx-dot"></div>
      <span id="ctx-text">Завантаження стану персонажа…</span>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages">
      <div class="msg dm">
        <div class="msg-avatar">📜</div>
        <div class="msg-body">
          <div class="msg-bubble">Вітаю, мандрівнику. Де ми зупинились — і що ти маєш намір зробити далі?</div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="Опишіть дії персонажа… (Enter — надіслати, Shift+Enter — новий рядок)"
      ></textarea>
      <div class="input-row">
        <span class="input-hint" id="input-hint">Enter — надіслати</span>
        <button id="send-btn">Надіслати ⟶</button>
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    renderNav('play');

    // ── State ────────────────────────────────────────────────────────
    const history   = [];   // { role, content }[]
    let generating  = false;

    const msgsEl   = document.getElementById('messages');
    const inputEl  = document.getElementById('chat-input');
    const sendBtn  = document.getElementById('send-btn');
    const ctxBar   = document.getElementById('ctx-bar');
    const ctxText  = document.getElementById('ctx-text');

    // ── Context loading ──────────────────────────────────────────────
    async function loadContext() {
      const t = Date.now();
      const [character, inventory, spells, journal] = await Promise.all([
        fetch(`data/character.json?t=${t}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
        fetch(`data/inventory.json?t=${t}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
        fetch(`data/spells.json?t=${t}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
        fetch(`data/journal.json?t=${t}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
      ]);
      return { character, inventory, spells, journal: journal.slice(0, 5) };
    }

    function updateCtxBar(ctx) {
      const ch = ctx.character;
      ctxBar.className = 'ctx-bar ok';
      ctxText.textContent = `${ch.name} · ${ch.race} ${ch.class} ${ch.level} рів. · HP ${ch.hp}/${ch.hp_max} · AC ${ch.ac}`;
    }

    // Initial load
    loadContext().then(updateCtxBar).catch(err => {
      ctxBar.className = 'ctx-bar err';
      ctxText.textContent = 'Не вдалось завантажити дані персонажа: ' + err.message;
    });

    // ── Message helpers ──────────────────────────────────────────────
    function addMessage(role, text) {
      const isPlayer = role === 'user';
      const wrap = document.createElement('div');
      wrap.className = `msg ${isPlayer ? 'player' : 'dm'}`;
      wrap.innerHTML = `
        <div class="msg-avatar">${isPlayer ? '🧙' : '📜'}</div>
        <div class="msg-body"><div class="msg-bubble"></div></div>`;
      const bubble = wrap.querySelector('.msg-bubble');
      bubble.textContent = text;
      msgsEl.appendChild(wrap);
      scrollDown();
      return bubble;
    }

    function addThinking() {
      const wrap = document.createElement('div');
      wrap.className = 'msg dm';
      wrap.id = 'thinking';
      wrap.innerHTML = `
        <div class="msg-avatar">📜</div>
        <div class="msg-body">
          <div class="thinking-wrap"><span></span><span></span><span></span></div>
        </div>`;
      msgsEl.appendChild(wrap);
      scrollDown();
      return wrap;
    }

    function addSaveBtn(bubble, text) {
      const btn = document.createElement('button');
      btn.className = 'save-btn';
      btn.textContent = '📓 Зберегти в щоденник';
      btn.onclick = () => saveToJournal(text);
      bubble.parentElement.appendChild(btn);
    }

    function scrollDown() {
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }

    // ── Save to journal ──────────────────────────────────────────────
    // Stores in localStorage so admin.html can optionally read it,
    // also copies to clipboard for manual paste.
    function saveToJournal(text) {
      localStorage.setItem('dnd_journal_draft', text);
      navigator.clipboard?.writeText(text).catch(() => {});
      window.open('admin.html', '_blank');
      if (typeof notify === 'function') {
        notify('Текст скопійовано та збережено. Вставте у поле щоденника в адмін-панелі.');
      }
    }

    // ── Send ─────────────────────────────────────────────────────────
    async function send() {
      const text = inputEl.value.trim();
      if (!text || generating) return;

      generating = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = '';

      addMessage('user', text);
      history.push({ role: 'user', content: text });

      // Fetch fresh context before each request
      let context = null;
      try {
        context = await loadContext();
        updateCtxBar(context);
      } catch (err) {
        ctxBar.className = 'ctx-bar err';
        ctxText.textContent = 'Помилка контексту: ' + err.message;
      }

      const thinkEl = addThinking();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history.slice(-20), context }),
        });

        thinkEl.remove();

        if (!res.ok) {
          throw new Error(`Сервер: ${res.status} — ${await res.text()}`);
        }

        const bubble = addMessage('assistant', '');
        let fullText = '';

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        outer: while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() ?? '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') break outer;
            try {
              const parsed = JSON.parse(raw);
              if (parsed.error) throw new Error(parsed.error);
              if (parsed.text) {
                fullText += parsed.text;
                bubble.textContent = fullText;
                scrollDown();
              }
            } catch (parseErr) {
              if (parseErr.message !== 'Unexpected token') throw parseErr;
            }
          }
        }

        history.push({ role: 'assistant', content: fullText });
        addSaveBtn(bubble, fullText);

      } catch (err) {
        document.getElementById('thinking')?.remove();
        addMessage('assistant', '⚠ Помилка: ' + err.message);
      }

      generating = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // ── Input events ─────────────────────────────────────────────────
    sendBtn.addEventListener('click', send);

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
    });
  </script>
</body>
</html>
